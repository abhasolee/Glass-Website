<!DOCTYPE html>
<html lang="en"> 
    <head> 
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width", 
        initial-scale=1.0" />
        <title> Glass Website </title>
        <link rel="stylesheet" href="styles.css"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
     </head>
     <body>
        <main>
            <section class="glass">
                <div class="dashboard">
                    <div class="user">
                        <img src="images/avatar.png" alt="Avatar">
                        <h3>Abhas Oli</h3>
                        <p>Pro Member</p>
                    </div>
                    <div class="links">
                        <div class="link">
                            <img src="images/twitch.png" alt="Streams">
                            <h3>Streams</h3>
                        </div>
                        <div class="link">
                            <img src="images/steam.png" alt="Games">
                            <h3>Games</h3>
                        </div>
                        <div class="link">
                            <img src="images/upcoming.png" alt="New">
                            <h3>New</h3>
                        </div>
                        <div class="link">
                            <img src="images/library.png" alt="Library">
                            <h3>Library</h3>
                        </div>
                    </div>
                    <div class="pro">
                        <h3>Join pro for free games</h3>
                        <img src="images/controller.png" alt="Pro">   
                    </div>

                </div>
                <div class="games">
                    <div class="title">
                        <h1> Active Games</h1>
                        <input type="text"/>
                    </div>
                    <div class="cards">
                        <div class="card">
                            <img src="images/assassins.png" alt="Assassins"/>
                            <div class="card-info">
                                <h3> Assassins Creed Valhalla</h3>
                                <p>PS5 Version</p>
                                <div class="progress"></div>
                            </div>
                            <h3 class="percentage">60%</h3>
                        </div>
                        <div class="card">
                            <img src="images/sackboy.png" alt="Sackboy"/>
                            <div class="card-info">
                                <h3> Assassins Creed Valhalla</h3>
                                <p>PS5 Version</p>
                                <div class="progress"></div>
                            </div>
                            <h3 class="percentage">60%</h3>
                        </div>
                        <div class="card">
                            <img src="images/spiderman.png" alt="Spiderman"/>
                            <div class="card-info">
                                <h3> Assassins Creed Valhalla</h3>
                                <p>PS5 Version</p>
                                <div class="progress"></div>
                            </div>
                            <h3 class="percentage">60%</h3>
                        </div>
                    </div>
                </div>

            </section>
        </main>
        <div class="circle1"></div>
        <div class="circle2"></div>
     </body>
</html>
